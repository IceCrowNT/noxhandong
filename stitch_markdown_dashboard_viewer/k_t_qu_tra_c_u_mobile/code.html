<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pt-touch-target-min">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-surface-variant text-primary dark:text-primary-fixed fixed top-0 w-full z-50 border-b border-outline-variant dark:border-outline">
<div class="flex items-center justify-between px-gutter-mobile md:px-gutter-desktop h-touch-target-min w-full max-w-container-max mx-auto">
<div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed font-variation-settings: 'FILL' 1;" data-icon="home_work" data-weight="fill">home_work</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Cư Dân Xanh</span>
</div>
<button class="font-label-sm text-label-sm text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 transition-transform bg-transparent border-none p-2 rounded-DEFAULT">
                Quản trị
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<!-- Suppressed BottomNavBar due to Task-Focused/Success intent -->
<main class="flex-grow w-full max-w-container-max mx-auto px-gutter-mobile py-8 flex flex-col items-center justify-center">
<div class="w-full max-w-md flex flex-col gap-6">
<!-- Success Indicator -->
<div class="flex flex-col items-center text-center gap-2 mb-2">
<div class="w-16 h-16 rounded-full bg-[#E5F2EB] flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-[32px] text-status-success font-variation-settings: 'FILL' 1;" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">Tra Cứu Thành Công</h1>
<p class="font-body-md text-body-md text-text-muted">Thông tin đóng phí quản lý căn hộ</p>
</div>
<!-- Compact Result Card -->
<div class="bg-surface-card border border-border-subtle rounded-lg p-6 flex flex-col gap-4 shadow-sm relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-status-success"></div>
<div class="flex flex-col gap-1">
<span class="font-label-sm text-label-sm text-text-muted uppercase tracking-wider">Mã Căn Hộ</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-text-main">L1.115</span>
</div>
<div class="h-[1px] w-full bg-border-subtle my-2"></div>
<div class="flex flex-col gap-2">
<span class="font-label-sm text-label-sm text-text-muted uppercase tracking-wider">Tình Trạng Đóng Phí</span>
<div class="bg-[#E5F2EB] border border-[#BCE3D0] rounded-DEFAULT p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-status-success mt-0.5" data-icon="task_alt">task_alt</span>
<span class="font-body-lg text-body-lg text-status-success font-medium">Đã đóng hết tháng 11 năm 2025</span>
</div>
</div>
<div class="mt-4 flex items-center justify-between text-text-muted">
<span class="font-label-sm text-label-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="update">update</span>
                        Cập nhật: Hôm nay, 08:30
                    </span>
<span class="bg-surface-container-low border border-border-subtle rounded-full px-2 py-1 font-label-sm text-[11px]">Đã xác thực</span>
</div>
</div>
<!-- Primary Action -->
<div class="mt-4">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold h-touch-target-min rounded-DEFAULT flex items-center justify-center gap-2 hover:bg-primary-fixed-variant transition-colors active:scale-95 transition-transform" onclick="window.history.back()">
<span class="material-symbols-outlined" data-icon="search">search</span>
                    Tra cứu mã khác
                </button>
</div>
</div>
